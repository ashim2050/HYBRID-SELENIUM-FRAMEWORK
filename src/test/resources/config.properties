# Hybrid Selenium Framework - Configuration
# =====================================================

# ----- Browser ---------------------------------------
# Supported: chrome | firefox | edge
browser=chrome
headless=true

# ----- Application ------------------------------------
base.url=https://the-internet.herokuapp.com

# ----- API Testing ------------------------------------
api.base.url=https://jsonplaceholder.typicode.com
# Corporate proxy - routes Java HTTP client through the same proxy as the browser
# Disabled locally to avoid Connection refused when no proxy is listening
api.proxy.host=
api.proxy.port=0

# ----- Excel Input Paths ------------------------------
# Master config Excel (controls which modules to run)
master.excel.path=Input/MasterConfig.xlsx

# Default sheet name inside every module Excel file
module.default.sheet=TestCases

# ----- Generated Output Paths -------------------------
json.output.path=output/testdata/
testng.output.path=output/testng-dynamic.xml
reports.output.path=output/reports/

# ----- Timeout (seconds) ------------------------------
implicit.wait=10
explicit.wait=20
page.load.timeout=30

# ----- Parallel Execution -----------------------------
# Set in generated testng.xml; values: false | methods | classes | tests
parallel.execution=false
thread.count=2
